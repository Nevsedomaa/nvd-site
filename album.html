<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Альбом - Не все дома</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/album.css">
</head>
<body>

    <header class="header">
        <div class="header__inner">
            <a href="index.html" class="header__logo" aria-label="На главную">
                <img src="assets/images/logo.png" alt="Не все дома">
            </a>

            <nav class="header__nav">
                <a href="index.html">Главная</a>
                <a href="releases.html" class="is-active">Релизы</a>
                <a href="lyrics.html">Тексты</a>
                <a href="merch.html">Мерч</a>
                <a href="concerts.html">Концерты</a>
                <a href="about.html">О группе</a>
                <a href="contacts.html">Контакты</a>
            </nav>

            <button class="burger" type="button" aria-label="Открыть меню">
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="album-page">
            <div class="container album-page__container">
                <a href="releases.html" class="album-page__back" data-reveal>← Все релизы</a>

                <div class="album-page__layout">
                    <div class="album-page__media" data-reveal>
                        <img src="assets/images/album-mestoimenie.jpg" alt="" class="album-page__cover" data-album-cover>

                        <div class="album-page__links" data-album-services></div>
                    </div>

                    <div class="album-page__content" data-reveal>
                        <p class="album-page__meta" data-album-meta>Альбом 2025</p>
                        <h1 data-album-title>Местоимение</h1>
                        <p class="album-page__description" data-album-description></p>

                        <div class="album-tracks__head">
                            <h2>Треки</h2>
                            <p data-track-range></p>
                        </div>

                        <div class="album-tracks" data-track-list></div>

                        <div class="album-tracks__controls" data-track-controls>
                            <button type="button" class="album-tracks__control" data-track-prev aria-label="Предыдущие треки">←</button>
                            <button type="button" class="album-tracks__control" data-track-next aria-label="Следующие треки">→</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer" id="contacts">
        <div class="footer__inner">
            <div class="footer__brand">
                <img src="assets/images/logo.png" alt="Не все дома">

                <p>
                    Русский инди-рок, пост-панк и альтернатива.
                    Музыка о городе, тревоге и поиске свободы.
                </p>
            </div>

            <div class="footer__col">
                <h3>Навигация</h3>
                <a href="releases.html">Релизы</a>
                <a href="lyrics.html">Тексты</a>
                <a href="concerts.html">Концерты</a>
                <a href="merch.html">Мерч</a>
            </div>

            <div class="footer__col footer__contacts">
                <h3>Связь</h3>
                <a href="mailto:roomtv@yandex.ru">roomtv@yandex.ru</a>

                <div class="footer__socials">
                    <a href="https://vk.com/nooneathome" target="_blank" rel="noopener">VK</a>
                    <a href="https://t.me/+zwWmMEf_yt8xZGQy" target="_blank" rel="noopener">Telegram</a>
                </div>
            </div>
        </div>

        <div class="footer__bottom">
            © 2026 Не все дома
        </div>
    </footer>

    <button class="scroll-top" type="button" aria-label="Наверх">
        ↑
    </button>

    <script src="js/releases-data.js"></script>
    <script src="js/album.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
